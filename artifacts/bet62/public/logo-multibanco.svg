<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 44" role="img" aria-label="Multibanco">
  <!-- Blue background -->
  <rect width="120" height="44" rx="8" fill="#003F7F"/>
  <!-- Yellow bottom strip -->
  <path d="M0 36 h120 v4 q0 4 -8 4 H8 q-8 0 -8 -4 Z" fill="#FFD100"/>
  <!-- "mb" italic bold text -->
  <text x="9" y="29" font-family="Arial Black,Arial,sans-serif" font-size="22" font-weight="900" font-style="italic" fill="#FFFFFF" letter-spacing="-0.5">mb</text>
  <!-- "multi" and "banco" stacked -->
  <text x="57" y="21" font-family="Arial,sans-serif" font-size="7.5" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="0.5">multi</text>
  <text x="57" y="31" font-family="Arial,sans-serif" font-size="7.5" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="0.5">banco</text>
</svg>
