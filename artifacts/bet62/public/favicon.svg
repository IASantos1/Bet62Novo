<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1a0707"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dadada"/>
    </radialGradient>
    <clipPath id="fc">
      <circle cx="16" cy="14" r="11"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Ball -->
  <circle cx="16" cy="14" r="11" fill="url(#ball)"/>

  <!-- Soccer patches -->
  <g clip-path="url(#fc)" fill="#909090" opacity="0.75">
    <!-- Top -->
    <polygon points="16,5 19.5,8 18.5,12 13.5,12 12.5,8"/>
    <!-- Upper-left -->
    <polygon points="6,11 8.5,8.5 13,9 13.5,12.5 10.5,14.5 6.5,13"/>
    <!-- Upper-right -->
    <polygon points="26,11 23.5,8.5 19,9 18.5,12.5 21.5,14.5 25.5,13"/>
    <!-- Lower-left -->
    <polygon points="6.5,19 6,15 10,14.5 12,16.5 9.5,20"/>
    <!-- Lower-right -->
    <polygon points="25.5,19 26,15 22,14.5 20,16.5 22.5,20"/>
    <!-- Bottom -->
    <polygon points="16,25 12,21 13,18.5 19,18.5 20,21"/>
  </g>

  <!-- "62" text centered on ball -->
  <text x="16" y="17"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="7"
    text-anchor="middle"
    font-style="italic"
    letter-spacing="-0.3"
    fill="#dc2626">62</text>
</svg>
